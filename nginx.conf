server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Always refresh app shell to avoid stale chunk references after deploy
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Service worker and manifest must not be immutable
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    location = /manifest.webmanifest {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # Hashed build assets can be cached aggressively
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
}
